; ******* Tiberian Factions mod weapons (TD ports) *******

; TD Advanced Guard Tower Missile — fires the BULLET_SSM ("DRAGON") homing
; missile in salvos of 2 (TD ClassATower.IsTwoShooter=true). Dual-role
; (air & ground) like TD's original.
; Source: tiberiandawn/const.cpp WEAPON_TOW_TWO
;   {BULLET_SSM, 60, 40, 0x0680, VOC_ROCKET2, ANIM_NONE}
; Burst=2 implements TD's IsTwoShooter on ClassATower — TD has it as a
; building-class flag; RA derives Is_Two_Shooter() from PrimaryWeapon->Burst>1
; (techno.cpp:7155-7161). Same Fire_At toggle/delay mechanic, RA idiom.
; Warhead=TDHE (not RA's vanilla [HE]) per docs/td-atwr-deep-dive.md M5.
[TDTowTwo]
Damage=60
ROF=40
Range=6.5
Projectile=TDSSM
; Speed=60 is TD's raw MPH_ROCKET (tiberiandawn/defines.h:627). TDTowTwo is
; flagged IsTDPort=true in rules.cpp so WeaponTypeClass::Read_INI parses this
; as raw MPHType instead of RA's 0-100 percentage. Direct TD-source value.
; See [[reference-ra-mphtype-ini-format]] / [[project-td-port-architecture]].
Speed=60
Warhead=TDHE
Report=ROCKET2
Anim=GUNFIRE
Burst=2

