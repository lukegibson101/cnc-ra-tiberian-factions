; Speed=40 verified against MPH_VERY_FAST (RA [90mm]/[TurretGun] match).
; See docs/td-gtwr-gun-verification.md.
[TDTurretGun]
Damage=40
ROF=60
Range=6
Projectile=TDAPDS
