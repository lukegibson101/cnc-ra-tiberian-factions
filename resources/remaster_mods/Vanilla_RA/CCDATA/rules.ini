; Tiberian Factions mod: TD Obelisk laser beam (instant-hit, invisible
; projectile until M5 line-render lands). Also serves as the warhead
; section — bullet and warhead parsers read disjoint field sets from
; the same [TDLaser] section.
; Source — bullet: tiberiandawn/bbdata.cpp ClassLaser (BULLET_LASER).
; Source — warhead: tiberiandawn/const.cpp WARHEAD_LASER {0x100x5}.
[TDLaser]
; --- bullet fields ---
; Warhead= sets BulletTypeClass::ClassWarhead, consumed by BulletClass::AI_TD's
; Explosion_Damage call (bullet.cpp:1261). Without this, ClassWarhead defaults
; to WARHEAD_NONE and Explosion_Damage early-returns at combat.cpp:171 → 0 damage.
; TD-port-only quirk: vanilla RA uses the per-instance Warhead set from the
; weapon, but TD's verbatim detonation uses Class->ClassWarhead instead.
; Points at the same-name [TDLaser] *warhead* section below (separate heap entry,
; registered in rules.cpp:651).
Warhead=TDLaser
Inviso=yes
High=yes
Shadow=no
AA=no
AG=yes
ROT=0
Rotates=no
Image=none
; --- warhead fields ---
Spread=4
Wall=no
Wood=no
Ore=no
Verses=100%,100%,100%,100%,100%
Explosion=0
InfDeath=5

; Tiberian Factions mod: TD Nike SAM launcher weapon.
; Source: tiberiandawn/const.cpp WEAPON_NIKE
;   {BULLET_SAM, 50, 50, 0x0780, VOC_ROCKET2, ANIM_NONE}
; NOT aliased to RA's [Nike]: RA's has ROF=20 + Report=MISSILE1, TD-authentic
; values are ROF=50 + Report=ROCKET2 per the TD-separation principle.
[TDNike]
Damage=50
ROF=50            ; TD-authentic (RA's [Nike] uses 20)
Range=7.5         ; TD 0x0780 leptons = 7.5 cells (matches RA's [Nike])
Projectile=TDPatriot
Speed=100         ; MPH_VERY_FAST per TD's ClassPatriot (defines.h:1115)
Warhead=TDAP        ; TD WARHEAD_AP (BULLET_SAM) -- was RA-vanilla AP leak
Report=ROCKET2    ; TD VOC_ROCKET2 (audio.cpp:253 VOC_TD_ROCKET2)
Anim=SAMFIRE      ; Resolves to ANIM_SAM_N; techno.cpp:3392 spawns directional overlay

; Tiberian Factions mod: TD BULLET_SAM (Patriot) — projectile TDNike fires.
; Source: tiberiandawn/bbdata.cpp ClassPatriot
;   "MISSILE", High=true, Homes=true, Proximity=true, Animates=true,
;   Ranged=true, AA-capable=true, MPH_VERY_FAST, ROT=10, WARHEAD_AP,
;   ANIM_VEH_HIT1.
; Distinct from RA's [AAMissile]: TD's BULLET_SAM uses "MISSILE" sprite (not
; "DRAGON"), is accurate (RA's AAMissile is Translucent=yes and has no Homing),
; ROT=10 (more agile than RA's AAMissile ROT=20). Warhead= required so
; bullet.cpp:1261 Explosion_Damage doesn't early-return per the TD-port quirk.
[TDPatriot]
